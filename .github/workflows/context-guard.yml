name: Context MRI Proof

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/**'
      - 'server/**'
      - 'plugins/**'
      - '.agents/**'
      - 'scripts/**'
      - 'samples/context-guard/**'
      - 'submission/**'
      - 'README.md'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/context-guard.yml'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'server/**'
      - 'plugins/**'
      - '.agents/**'
      - 'scripts/**'
      - 'samples/context-guard/**'
      - 'submission/**'
      - 'README.md'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/context-guard.yml'

permissions:
  contents: read

concurrency:
  group: context-mri-proof-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression-guard:
    name: Prove diagnosis, repair, and release context
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Check production dependency advisories
        run: npm audit --omit=dev --audit-level=high
      - name: Run evaluator and provenance regressions
        run: npm test
      - name: Build the public product
        run: npm run build
      - name: Validate the installable Codex plugin
        run: npm run check:plugin
      - name: Prove the plugin over the real MCP stdio transport
        run: npm run smoke:plugin
      - name: Audit Context MRI's own release context
        run: npm run audit:self -- --output "${{ runner.temp }}/context-mri-self-audit.json"
      - name: Prove original blocked and repair passed
        run: npm run guard:prove -- --output "${{ runner.temp }}/context-mri-context-guard-proof.json"
      - name: Prove lexical robustness and disclose the semantic negative control
        run: npm run robustness:prove -- --output "${{ runner.temp }}/context-mri-robustness-proof.json"
      - name: Publish inspectable proof artifacts
        uses: actions/upload-artifact@v7
        with:
          name: context-mri-proof-${{ github.run_number }}
          path: |
            ${{ runner.temp }}/context-mri-self-audit.json
            ${{ runner.temp }}/context-mri-context-guard-proof.json
            ${{ runner.temp }}/context-mri-robustness-proof.json
          if-no-files-found: error
          retention-days: 30
